<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benita Rego</title>
  <script type="text/javascript" src="https://platform.linkedin.com/badges/js/profile.js" async defer></script>
  <link rel="icon" href="logoss.png" type="image/png"></head>
  <style>
    body, html {
  margin: 0;
  height: 100%;
  text-align: center;
  font-family: 'Oxygen Mono', monospace;
  color: gray;
}


h1 {
  text-transform: uppercase;
  letter-spacing: 1pt;
  font-size: 30pt;
  margin-bottom: 15px;
}

p {
  text-align: left;
  margin: 0;
  font-size: 30px;
  font-weight: 900;
  width: 50%;
  display: none;
}

#table {
	display: table;
	width: 100%;
	height: 100%;
  background-color: black;
}

#centeralign {
	display: table-cell;
	vertical-align: middle;
}

.button {
  border-radius: 4px;
  background-image: linear-gradient(to bottom right, black, purple);
  border: none;
  border-radius: 20px;
  color: #FFFFFF;
  text-align: center;
  font-size: 28px;
  padding: 10px;
  width: 230px;
  height: 50px;
  transition: all 0.5s;
  cursor: pointer;
  margin: 5px;
}

#btn {
  animation: cssAnimation 0s 6.5s forwards;
  opacity: 0; 
}

@keyframes cssAnimation {
  to   { opacity: 1; }
}

.button hover {
  opacity: 0.5;
}
  </style>
</head>
<body style="background-color: black;"> 
  <div id="table">
    <div id="centeralign">
      <center><h1>Hi! I'm Benita!</h1><br>
      <p style="text-align: center;">Click here to explore...</p><br><br>
      <a href="portfolio.html"><button class="button" id="btn">Click Here!</button></a></center>
    </div>
  </div>

  <script>
  
  function typeEffect(element, speed) {
	var text = element.innerHTML;
	element.innerHTML = "";
	
	var i = 0;
	var timer = setInterval(function() {
    if (i < text.length) {
      element.append(text.charAt(i));
      i++;
    } else {
      clearInterval(timer);
    }
  }, speed);
}

// application
var speed = 150;
var h1 = document.querySelector('h1');
var p = document.querySelector('p');
var button = document.querySelector('button');
var delay = h1.innerHTML.length * speed + speed;

// type affect to header
typeEffect(h1, speed);

// type affect to body
setTimeout(function(){
  p.style.display = "inline-block";
  typeEffect(p, speed);
}, delay);

  </script>
  </body>
</html>
